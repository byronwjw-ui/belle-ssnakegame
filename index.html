<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>🦄 Belle的魔法独角兽贪吃蛇 🌈</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%;
    min-height: 100vh;
    overflow-x: hidden;
    font-family: 'Comic Sans MS', 'PingFang SC', 'Microsoft YaHei', cursive, sans-serif;
    background: linear-gradient(135deg, #ffd6f5 0%, #ffe4f1 25%, #fff0fa 50%, #e4d4ff 75%, #d4f0ff 100%);
    background-size: 400% 400%;
    animation: skyShift 18s ease infinite;
    color: #d63384;
    user-select: none;
    -webkit-user-select: none;
  }
  @keyframes skyShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* ---------- floating sparkles in background ---------- */
  .sparkles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .sparkles span {
    position: absolute;
    display: block;
    font-size: 18px;
    opacity: 0;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { transform: translateY(110vh) rotate(0deg) scale(0.6); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateY(-10vh) rotate(360deg) scale(1.2); opacity: 0; }
  }

  /* ---------- header ---------- */
  header {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 22px 12px 6px;
  }
  h1 {
    font-size: clamp(26px, 5.6vw, 44px);
    background: linear-gradient(90deg, #ff6ec7, #c084fc, #60a5fa, #ff6ec7);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 2px 0 rgba(255,255,255,0.6);
    animation: rainbowText 6s linear infinite;
    letter-spacing: 1px;
    line-height: 1.2;
  }
  @keyframes rainbowText {
    0%   { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }
  .subtitle {
    margin-top: 8px;
    color: #b03a8c;
    font-size: clamp(13px, 2.5vw, 16px);
    font-weight: 700;
  }

  /* ---------- main card ---------- */
  main {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 14px 12px 30px;
  }
  .card {
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 3px solid #ffb3df;
    border-radius: 28px;
    padding: 16px;
    box-shadow:
      0 0 0 6px rgba(255,255,255,0.6),
      0 18px 40px rgba(255, 110, 199, 0.25),
      inset 0 0 30px rgba(255, 255, 255, 0.4);
    width: min(96vw, 560px);
  }

  /* ---------- HUD ---------- */
  .hud {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 12px;
  }
  .stat {
    background: linear-gradient(160deg, #fff0fa, #ffd6ee);
    border: 2px solid #ffb3df;
    border-radius: 14px;
    padding: 8px 4px;
    text-align: center;
    box-shadow: inset 0 -3px 0 rgba(255,180,220,0.6);
  }
  .stat .label { font-size: 12px; color: #b03a8c; font-weight: 800; }
  .stat .value { font-size: 20px; color: #d63384; font-weight: 900; line-height: 1.1; margin-top: 2px; }

  /* ---------- canvas wrapper ---------- */
  .stage {
    position: relative;
    border-radius: 22px;
    overflow: hidden;
    border: 3px solid #ff8ec9;
    background:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,0.7), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(196,181,253,0.6), transparent 45%),
      linear-gradient(135deg, #fff5fb 0%, #ffe4f4 50%, #ecdcff 100%);
    box-shadow: inset 0 0 30px rgba(255,143,201,0.25);
    aspect-ratio: 1 / 1;
  }
  canvas { display: block; width: 100%; height: 100%; touch-action: none; }

  /* overlay screens */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    background: linear-gradient(135deg, rgba(255,214,245,0.85), rgba(228,212,255,0.85));
    backdrop-filter: blur(6px);
    z-index: 5;
    transition: opacity 0.3s;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; }
  .overlay h2 {
    font-size: clamp(24px, 5vw, 34px);
    background: linear-gradient(90deg, #ff6ec7, #c084fc);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
  }
  .overlay p {
    color: #b03a8c;
    font-size: 15px;
    line-height: 1.7;
    margin-bottom: 18px;
    font-weight: 700;
  }
  .overlay .emoji-big {
    font-size: 56px;
    margin-bottom: 8px;
    animation: bounce 1.4s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50%      { transform: translateY(-12px) rotate(5deg); }
  }

  /* ---------- buttons ---------- */
  .btn-row {
    margin-top: 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }
  button {
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-weight: 900;
    font-size: 16px;
    color: white;
    padding: 12px 22px;
    border-radius: 999px;
    background: linear-gradient(135deg, #ff6ec7 0%, #c084fc 100%);
    box-shadow: 0 6px 0 #d44aa8, 0 10px 20px rgba(255,110,199,0.4);
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 1px;
  }
  button:hover { transform: translateY(-2px); }
  button:active { transform: translateY(3px); box-shadow: 0 2px 0 #d44aa8, 0 4px 10px rgba(255,110,199,0.4); }
  button.ghost {
    background: linear-gradient(135deg, #fff, #ffe4f4);
    color: #d63384;
    box-shadow: 0 6px 0 #ffb3df, 0 10px 20px rgba(255,179,223,0.4);
  }
  button.ghost:active { box-shadow: 0 2px 0 #ffb3df, 0 4px 10px rgba(255,179,223,0.4); }

  /* speed selector */
  .speed-pick {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .speed-pick button {
    padding: 8px 14px;
    font-size: 13px;
    box-shadow: 0 4px 0 #ffb3df;
    background: linear-gradient(135deg, #fff, #ffe4f4);
    color: #d63384;
  }
  .speed-pick button.active {
    background: linear-gradient(135deg, #ff6ec7, #c084fc);
    color: white;
    box-shadow: 0 4px 0 #d44aa8;
  }

  /* ---------- mobile controls ---------- */
  .dpad {
    margin-top: 16px;
    display: grid;
    grid-template-columns: repeat(3, 64px);
    grid-template-rows: repeat(3, 64px);
    gap: 6px;
    justify-content: center;
    margin-left: auto;
    margin-right: auto;
  }
  .dpad button {
    padding: 0;
    font-size: 28px;
    border-radius: 18px;
    box-shadow: 0 4px 0 #d44aa8, 0 6px 14px rgba(255,110,199,0.3);
    background: linear-gradient(135deg, #ffaadf, #c084fc);
  }
  .dpad .up    { grid-column: 2; grid-row: 1; }
  .dpad .left  { grid-column: 1; grid-row: 2; }
  .dpad .right { grid-column: 3; grid-row: 2; }
  .dpad .down  { grid-column: 2; grid-row: 3; }

  .hint {
    text-align: center;
    color: #b03a8c;
    font-size: 12px;
    margin-top: 10px;
    font-weight: 700;
    opacity: 0.85;
  }

  /* score popup floating */
  .floatScore {
    position: absolute;
    pointer-events: none;
    font-weight: 900;
    font-size: 22px;
    color: #fff;
    text-shadow: 0 2px 6px rgba(255,110,199,0.8), 0 0 12px #ff6ec7;
    animation: scoreFly 0.9s ease-out forwards;
    z-index: 4;
  }
  @keyframes scoreFly {
    0%   { transform: translate(-50%, 0) scale(0.6); opacity: 0; }
    20%  { transform: translate(-50%, -10px) scale(1.2); opacity: 1; }
    100% { transform: translate(-50%, -60px) scale(1); opacity: 0; }
  }

  /* shake on game over */
  .shake { animation: shake 0.5s; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-8px); }
    40%, 80% { transform: translateX(8px); }
  }

  @media (max-width: 480px) {
    .hud { grid-template-columns: repeat(2, 1fr); }
    .dpad { grid-template-columns: repeat(3, 56px); grid-template-rows: repeat(3, 56px); }
  }
</style>
</head>
<body>

<div class="sparkles" id="sparkles"></div>

<header>
  <h1>🦄 Belle的魔法独角兽贪吃蛇 🌈</h1>
  <div class="subtitle">吃彩虹爱心 · 收集星星 · 解锁魔法力量 ✨</div>
</header>

<main>
  <div class="card">
    <div class="hud">
      <div class="stat"><div class="label">💖 分数</div><div class="value" id="score">0</div></div>
      <div class="stat"><div class="label">🏆 最高分</div><div class="value" id="best">0</div></div>
      <div class="stat"><div class="label">🐍 长度</div><div class="value" id="length">3</div></div>
      <div class="stat"><div class="label">⭐ 等级</div><div class="value" id="level">1</div></div>
    </div>

    <div class="speed-pick">
      <button data-speed="160" class="active">🌸 慢速</button>
      <button data-speed="110">🌟 中速</button>
      <button data-speed="75">⚡ 快速</button>
    </div>

    <div class="stage" id="stage">
      <canvas id="game" width="500" height="500"></canvas>

      <div class="overlay" id="startScreen">
        <div class="emoji-big">🦄</div>
        <h2>欢迎 Belle 公主！</h2>
        <p>
          用 <b>方向键</b> 或 <b>↑↓←→ 按钮</b> 操控独角兽<br/>
          吃 💖 爱心得分，每 5 颗出现 ⭐ 神奇道具！<br/>
          ⭐ 让你短暂无敌穿墙 + 双倍分数！
        </p>
        <button id="startBtn">🎮 开始冒险</button>
      </div>

      <div class="overlay hidden" id="overScreen">
        <div class="emoji-big">💔</div>
        <h2 id="overTitle">哎呀！</h2>
        <p id="overText">独角兽撞到啦～<br/>再来一次让 Belle 创造新纪录吧！</p>
        <button id="retryBtn">🔄 再玩一次</button>
      </div>

      <div class="overlay hidden" id="pauseScreen">
        <div class="emoji-big">⏸️</div>
        <h2>暂停中</h2>
        <p>休息一下喝口水～</p>
        <button id="resumeBtn">▶️ 继续游戏</button>
      </div>
    </div>

    <div class="btn-row">
      <button id="pauseBtn" class="ghost">⏸ 暂停</button>
      <button id="restartBtn" class="ghost">🔄 重新开始</button>
    </div>

    <div class="dpad">
      <button class="up"    data-dir="up">⬆️</button>
      <button class="left"  data-dir="left">⬅️</button>
      <button class="right" data-dir="right">➡️</button>
      <button class="down"  data-dir="down">⬇️</button>
    </div>

    <div class="hint">💡 提示：在手机上滑动屏幕也能控制方向哦～</div>
  </div>
</main>

<script>
/* =========================================================
   Belle's Magical Unicorn Snake 🦄✨
   ========================================================= */

// ---------- background sparkles ----------
(function makeSparkles(){
  const container = document.getElementById('sparkles');
  const emojis = ['✨','🌸','💖','⭐','🌟','🦋','🌷','💗','🩷','🌈'];
  for (let i = 0; i < 28; i++) {
    const s = document.createElement('span');
    s.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    s.style.left = Math.random()*100 + 'vw';
    s.style.fontSize = (12 + Math.random()*22) + 'px';
    s.style.animationDuration = (8 + Math.random()*14) + 's';
    s.style.animationDelay = (-Math.random()*15) + 's';
    container.appendChild(s);
  }
})();

// ---------- game setup ----------
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const GRID = 20;                       // 20x20 cells
const CELL = canvas.width / GRID;      // 25 px

const $score  = document.getElementById('score');
const $best   = document.getElementById('best');
const $length = document.getElementById('length');
const $level  = document.getElementById('level');

const stage         = document.getElementById('stage');
const startScreen   = document.getElementById('startScreen');
const overScreen    = document.getElementById('overScreen');
const pauseScreen   = document.getElementById('pauseScreen');
const overTitle     = document.getElementById('overTitle');
const overText      = document.getElementById('overText');

const startBtn      = document.getElementById('startBtn');
const retryBtn      = document.getElementById('retryBtn');
const resumeBtn     = document.getElementById('resumeBtn');
const pauseBtn      = document.getElementById('pauseBtn');
const restartBtn    = document.getElementById('restartBtn');

let snake, dir, nextDir, food, star, score, best, running, paused, tickMs, lastTick, powerUntil, particles, trailHue, foodEaten, level;

best = parseInt(localStorage.getItem('belleSnakeBest') || '0', 10);
$best.textContent = best;

let tickInterval = 160; // default slow

document.querySelectorAll('.speed-pick button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.speed-pick button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    tickInterval = parseInt(b.dataset.speed, 10);
  });
});

function reset() {
  snake = [
    {x: 10, y: 10},
    {x: 9,  y: 10},
    {x: 8,  y: 10}
  ];
  dir = {x: 1, y: 0};
  nextDir = {x: 1, y: 0};
  score = 0;
  foodEaten = 0;
  level = 1;
  powerUntil = 0;
  particles = [];
  trailHue = 320;
  placeFood();
  star = null;
  updateHUD();
}

function updateHUD() {
  $score.textContent = score;
  $best.textContent = best;
  $length.textContent = snake.length;
  $level.textContent = level;
}

function placeFood() {
  while (true) {
    const fx = Math.floor(Math.random()*GRID);
    const fy = Math.floor(Math.random()*GRID);
    if (!snake.some(s => s.x === fx && s.y === fy) && !(star && star.x===fx && star.y===fy)) {
      food = {x: fx, y: fy, born: performance.now()};
      return;
    }
  }
}

function placeStar() {
  while (true) {
    const sx = Math.floor(Math.random()*GRID);
    const sy = Math.floor(Math.random()*GRID);
    if (!snake.some(s => s.x === sx && s.y === sy) && !(food.x===sx && food.y===sy)) {
      star = {x: sx, y: sy, born: performance.now(), life: 6000};
      return;
    }
  }
}

// ---------- input ----------
function setDir(nx, ny) {
  // prevent reversing into self
  if (snake.length > 1 && nx === -dir.x && ny === -dir.y) return;
  nextDir = {x: nx, y: ny};
}

window.addEventListener('keydown', (e) => {
  const k = e.key;
  if (k === 'ArrowUp' || k === 'w' || k === 'W')    { setDir(0,-1); e.preventDefault(); }
  if (k === 'ArrowDown' || k === 's' || k === 'S')  { setDir(0, 1); e.preventDefault(); }
  if (k === 'ArrowLeft' || k === 'a' || k === 'A')  { setDir(-1,0); e.preventDefault(); }
  if (k === 'ArrowRight' || k === 'd' || k === 'D') { setDir(1, 0); e.preventDefault(); }
  if (k === ' ') togglePause();
});

document.querySelectorAll('.dpad button').forEach(b => {
  const fire = (e) => {
    e.preventDefault();
    const d = b.dataset.dir;
    if (d === 'up') setDir(0,-1);
    if (d === 'down') setDir(0, 1);
    if (d === 'left') setDir(-1,0);
    if (d === 'right') setDir(1, 0);
  };
  b.addEventListener('click', fire);
  b.addEventListener('touchstart', fire, {passive:false});
});

// swipe on canvas
let touchStart = null;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    touchStart = {x: e.touches[0].clientX, y: e.touches[0].clientY};
  }
}, {passive:true});
canvas.addEventListener('touchmove', e => { e.preventDefault(); }, {passive:false});
canvas.addEventListener('touchend', e => {
  if (!touchStart) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStart.x;
  const dy = t.clientY - touchStart.y;
  if (Math.abs(dx) < 20 && Math.abs(dy) < 20) { touchStart = null; return; }
  if (Math.abs(dx) > Math.abs(dy)) setDir(dx>0?1:-1, 0);
  else setDir(0, dy>0?1:-1);
  touchStart = null;
});

// ---------- buttons ----------
startBtn.addEventListener('click', () => { startScreen.classList.add('hidden'); startGame(); });
retryBtn.addEventListener('click', () => { overScreen.classList.add('hidden'); startGame(); });
resumeBtn.addEventListener('click', () => togglePause());
pauseBtn.addEventListener('click', () => togglePause());
restartBtn.addEventListener('click', () => { overScreen.classList.add('hidden'); pauseScreen.classList.add('hidden'); startGame(); });

function startGame() {
  reset();
  running = true;
  paused = false;
  lastTick = performance.now();
  requestAnimationFrame(loop);
}

function togglePause() {
  if (!running) return;
  paused = !paused;
  if (paused) {
    pauseScreen.classList.remove('hidden');
  } else {
    pauseScreen.classList.add('hidden');
    lastTick = performance.now();
    requestAnimationFrame(loop);
  }
}

// ---------- main loop ----------
function loop(now) {
  if (!running || paused) return;

  const elapsed = now - lastTick;
  if (elapsed >= tickInterval) {
    lastTick = now;
    step();
  }
  draw(now);
  requestAnimationFrame(loop);
}

function step() {
  dir = nextDir;
  let head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  const invincible = performance.now() < powerUntil;

  // wall handling
  if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
    if (invincible) {
      head.x = (head.x + GRID) % GRID;
      head.y = (head.y + GRID) % GRID;
    } else {
      return gameOver('撞墙啦！');
    }
  }

  // self collision (allow during invincibility)
  if (!invincible && snake.some(s => s.x === head.x && s.y === head.y)) {
    return gameOver('撞到自己啦！');
  }

  snake.unshift(head);

  // eat food
  if (head.x === food.x && head.y === food.y) {
    const gained = invincible ? 20 : 10;
    score += gained;
    foodEaten++;
    if (score > best) { best = score; localStorage.setItem('belleSnakeBest', best); }
    spawnParticles(food.x, food.y, '💖');
    showFloatScore(food.x, food.y, '+' + gained);
    placeFood();
    // level up every 5 foods
    if (foodEaten % 5 === 0) level++;
    // spawn star occasionally
    if (foodEaten % 5 === 0 && !star) placeStar();
  } else {
    snake.pop();
  }

  // eat star
  if (star && head.x === star.x && head.y === star.y) {
    score += 30;
    if (score > best) { best = score; localStorage.setItem('belleSnakeBest', best); }
    spawnParticles(star.x, star.y, '⭐');
    showFloatScore(star.x, star.y, '+30 ⭐ 无敌!');
    powerUntil = performance.now() + 5000;
    star = null;
  }

  // star expires
  if (star && performance.now() - star.born > star.life) star = null;

  updateHUD();
}

function gameOver(reason) {
  running = false;
  stage.classList.add('shake');
  setTimeout(() => stage.classList.remove('shake'), 500);
  overTitle.textContent = score > 0 ? `得了 ${score} 分！` : '哎呀！';
  overText.innerHTML = `${reason}<br/>最高分：<b>${best}</b><br/>再来一次让 Belle 创造新纪录吧！`;
  overScreen.classList.remove('hidden');
}

// ---------- particles ----------
function spawnParticles(gx, gy, emoji) {
  const cx = gx * CELL + CELL/2;
  const cy = gy * CELL + CELL/2;
  for (let i = 0; i < 14; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 1 + Math.random() * 3;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
      life: 1, emoji,
      size: 12 + Math.random()*10,
      rot: Math.random()*Math.PI*2,
      vr: (Math.random()-0.5)*0.3
    });
  }
}

function showFloatScore(gx, gy, text) {
  const el = document.createElement('div');
  el.className = 'floatScore';
  el.textContent = text;
  const rect = canvas.getBoundingClientRect();
  el.style.left = (rect.left + (gx + 0.5) * (rect.width / GRID)) - stage.getBoundingClientRect().left + 'px';
  el.style.top  = (rect.top  + gy * (rect.height / GRID)) - stage.getBoundingClientRect().top + 'px';
  stage.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

// ---------- draw ----------
function draw(now) {
  // background
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // subtle grid sparkle dots
  ctx.save();
  for (let i = 0; i < GRID; i++) {
    for (let j = 0; j < GRID; j++) {
      if ((i+j) % 2 === 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
      } else {
        ctx.fillStyle = 'rgba(255,200,230,0.15)';
      }
      ctx.fillRect(i*CELL, j*CELL, CELL, CELL);
    }
  }
  ctx.restore();

  // food (heart)
  drawHeart(food.x, food.y, now);

  // star
  if (star) drawStar(star.x, star.y, now);

  // snake (rainbow trail)
  drawSnake(now);

  // particles
  drawParticles();
}

function drawSnake(now) {
  const invincible = now < powerUntil;
  trailHue = (trailHue + 0.6) % 360;

  // glow trail under snake
  for (let i = snake.length - 1; i >= 0; i--) {
    const seg = snake[i];
    const t = i / Math.max(1, snake.length-1);
    const hue = invincible
      ? ((now/2) + i*25) % 360
      : (trailHue + i * 18) % 360;
    const x = seg.x * CELL + CELL/2;
    const y = seg.y * CELL + CELL/2;
    const r = CELL/2 - 1;

    // glow
    const grad = ctx.createRadialGradient(x, y, 0, x, y, r*2.2);
    grad.addColorStop(0, `hsla(${hue},100%,75%,0.7)`);
    grad.addColorStop(1, `hsla(${hue},100%,75%,0)`);
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(x, y, r*2.2, 0, Math.PI*2); ctx.fill();

    // body
    ctx.fillStyle = `hsl(${hue}, 90%, ${60 - t*10}%)`;
    roundRect(ctx, seg.x*CELL+2, seg.y*CELL+2, CELL-4, CELL-4, 8);
    ctx.fill();

    // highlight
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    roundRect(ctx, seg.x*CELL+5, seg.y*CELL+5, CELL-12, (CELL-12)/2, 4);
    ctx.fill();
  }

  // head — unicorn face
  const h = snake[0];
  const hx = h.x*CELL, hy = h.y*CELL;

  // horn
  ctx.save();
  ctx.translate(hx + CELL/2, hy + CELL/2);
  let angle = 0;
  if (dir.x === 1)  angle = 0;
  if (dir.x === -1) angle = Math.PI;
  if (dir.y === -1) angle = -Math.PI/2;
  if (dir.y === 1)  angle = Math.PI/2;
  ctx.rotate(angle);

  // sparkle aura when invincible
  if (invincible) {
    ctx.shadowColor = `hsl(${(now/2)%360}, 100%, 70%)`;
    ctx.shadowBlur = 20;
  }

  // horn triangle
  const hornGrad = ctx.createLinearGradient(CELL/2-2, 0, CELL/2+8, 0);
  hornGrad.addColorStop(0, '#fff9b0');
  hornGrad.addColorStop(1, '#ffd700');
  ctx.fillStyle = hornGrad;
  ctx.beginPath();
  ctx.moveTo(CELL/2 - 3, -4);
  ctx.lineTo(CELL/2 + 9, 0);
  ctx.lineTo(CELL/2 - 3, 4);
  ctx.closePath();
  ctx.fill();

  // eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(2, -4, 3.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(2,  4, 3.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#2a1a3a';
  ctx.beginPath(); ctx.arc(3, -4, 1.8, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(3,  4, 1.8, 0, Math.PI*2); ctx.fill();
  // tiny smile
  ctx.strokeStyle = '#d63384';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(6, 0, 2, -Math.PI/3, Math.PI/3);
  ctx.stroke();

  ctx.restore();
}

function drawHeart(gx, gy, now) {
  const pulse = 1 + Math.sin(now/200) * 0.08;
  const cx = gx*CELL + CELL/2;
  const cy = gy*CELL + CELL/2;
  const size = (CELL/2 - 3) * pulse;

  // glow
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, size*2.5);
  g.addColorStop(0, 'rgba(255,110,199,0.7)');
  g.addColorStop(1, 'rgba(255,110,199,0)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(cx, cy, size*2.5, 0, Math.PI*2); ctx.fill();

  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(size/10, size/10);
  ctx.beginPath();
  ctx.moveTo(0, 4);
  ctx.bezierCurveTo(-10, -6, -10, -14, 0, -6);
  ctx.bezierCurveTo(10, -14, 10, -6, 0, 4);
  ctx.closePath();
  const hg = ctx.createLinearGradient(-10, -14, 10, 4);
  hg.addColorStop(0, '#ff8ec9');
  hg.addColorStop(1, '#ff3d97');
  ctx.fillStyle = hg;
  ctx.fill();
  // shine
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath();
  ctx.ellipse(-3, -6, 2, 3, -0.4, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawStar(gx, gy, now) {
  const pulse = 1 + Math.sin(now/120) * 0.15;
  const cx = gx*CELL + CELL/2;
  const cy = gy*CELL + CELL/2;
  const size = (CELL/2 - 2) * pulse;

  // rainbow glow
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, size*3);
  const hue = (now/4) % 360;
  g.addColorStop(0, `hsla(${hue},100%,70%,0.9)`);
  g.addColorStop(1, `hsla(${hue},100%,70%,0)`);
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(cx, cy, size*3, 0, Math.PI*2); ctx.fill();

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(now/600);
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const r = i%2===0 ? size : size*0.45;
    const a = (i / 10) * Math.PI * 2 - Math.PI/2;
    ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
  }
  ctx.closePath();
  const sg = ctx.createLinearGradient(-size, -size, size, size);
  sg.addColorStop(0, '#fff8b0');
  sg.addColorStop(1, '#ffb347');
  ctx.fillStyle = sg;
  ctx.fill();
  ctx.strokeStyle = '#ff8c00';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();
}

function drawParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.08;
    p.rot += p.vr;
    p.life -= 0.025;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.font = p.size + 'px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.emoji, 0, 0);
    ctx.restore();
  }
}

function roundRect(ctx, x, y, w, h, r) {
  if (w < 2*r) r = w/2;
  if (h < 2*r) r = h/2;
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y,   x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x,   y+h, r);
  ctx.arcTo(x,   y+h, x,   y,   r);
  ctx.arcTo(x,   y,   x+w, y,   r);
  ctx.closePath();
}

// initial idle render so the canvas isn't empty
reset();
running = false;
draw(performance.now());

// keep rendering a soft idle animation on the start screen
(function idleLoop(){
  if (!running) {
    draw(performance.now());
  }
  requestAnimationFrame(idleLoop);
})();

</script>
</body>
